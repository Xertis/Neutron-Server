# -----------------------------------------------------------------
# Generic Types
# -----------------------------------------------------------------

BlockPosition:
  fields:
    - x: int32
    - y: uint8
    - z: int32

Block:
  fields:
    - id: uint16
    - state: uint16
    - pos: BlockPosition

BlockRegionPosition:
  fields:
    - x: int8
    - y: uint8
    - z: int8

BlockRegion:
  fields:
    - id: uint16
    - state: uint16
    - pos: BlockRegionPosition

# -----------------------------------------------------------------
# Server
# -----------------------------------------------------------------

# -----------------------------------------------------------------
# Connecting
# -----------------------------------------------------------------

StatusResponse:
  fields:
    - protocol_reference: string
    - protocol_version: string

    - engine_version: string
    - api_version: string
    - neutron_version: string

    - short_desc: string
    - description: string
    - favicon: bytearray
    - friends_states: Array<boolean>
    - max: uint16
    - online: uint16

JoinSuccess:
  fields:
    - pid: var
    - game_time: uint16
    - rules: Array<Rule>
    - chunks_loading_distance: uint8
    - player: PlayerEntity

# -----------------------------------------------------------------
# In-Game
# -----------------------------------------------------------------

SynchronizePlayer:
  fields:
    - data: PlayerEntity

TimeUpdate:
  fields:
    - game_time: uint16[math.floor(W * 65535 + 0.5)][R / 65535]

KeepAlive:
  fields:
    - challenge: uint8

PlayerHandSlot:
  fields:
    - slot: uint8

OnlinePlayersList:
  fields:
    - list: Array<Pair<string, var>>

OnlinePlayersListAdd:
  fields:
    - data: Pair<string, var>

OnlinePlayersListRemove:
  fields:
    - pid: var

OpenVirtualInventory:
  fields:
    - layout: string
    - inventory_id: var[W+2][R-2]
    - disable_player_inventory: boolean[W or false]

OpenBlockInventory:
  fields:
    - inventory_id: var[W+2][R-2]
    - pos: BlockPosition

InventoryClose:
  fields:

InventorySync:
  fields:
    - inventory_id: var[W+2][R-2]
    - inventory: InventoryUnlimited

ChunkData:
  fields:
    - chunk: Chunk

ChunksData:
  fields:
    - list: Array<Chunk>

ChatMessage:
  fields:
    - message: string

BlockChanged:
  fields:
    - pid: var[W+1][R-1]
    - block: Block

PacksList:
  fields:
    - packs: Array<string>

PackEvent:
  fields:
    - pack: string
    - event: string
    - bytes: bytearray

PackEnv:
  fields:
    - pack: string
    - env: string
    - key: string
    - value: any

EntitySpawn:
  fields:
    - uid: var
    - def: uint16
    - dirty: Edd
    - args: NullAble<bson>

EntityUpdate:
  fields:
    - uid: var
    - dirty: Edd

EntityDespawn:
  fields:
    - uid: var

ParticleEmit:
  fields:
    - particle: Particle

ParticleOrigin:
  fields:
    - pid: var
    - origin: origin

ParticleStop:
  fields:
    - pid: var

AudioEmit:
  fields:
    - audio: Audio

AudioState:
  fields:
    - state: bson

AudioStop:
  fields:
    - id: var

Text3DShow:
  fields:
    - data: Text3D

Text3DPos:
  fields:
    - id: var
    - pos: Vec3<f32>

Text3DEntity:
  fields:
    - id: var
    - entity: var[W and W+1 or 0][R-1]

Text3DState:
  fields:
    - state: Text3D
Text3DAxis:
  fields:
    - id: var
    - axis: Vec3<f32>
    - is_x: boolean

Text3DHide:
  fields:
    - id: var

WrapShow:
  fields:
    - id: var
    - pos: BlockPosition
    - texture: string
    - emission: norm8

WrapSetPos:
  fields:
    - id: var
    - pos: BlockPosition

WrapSetTexture:
  fields:
    - id: var
    - texture: string

# (-X, +X, -Y, +Y, -Z, +Z)
WrapSetFaces:
  fields:
    - id: var
    - faces: Vec6<string>

WrapSetTints:
  fields:
    - id: var
    - faces: Vec6<Vec3<norm8>>

WrapHide:
  fields:
    - id: var

WeatherChanged:
  fields:
    - weather: bson
    - time: uint16
    - name: string

Disconnect:
  fields:
    - reason: string
