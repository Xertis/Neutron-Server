# -----------------------------------------------------------------
# Generic Types
# -----------------------------------------------------------------

BlockPosition:
  fields:
    - x: int32
    - y: uint8
    - z: int32

Block:
  fields:
    - id: uint16
    - state: uint16
    - pos: BlockPosition

BlockRegionPosition:
  fields:
    - x: int8
    - y: uint8
    - z: int8

BlockRegion:
  fields:
    - id: uint16
    - state: uint16
    - pos: BlockRegionPosition

# -----------------------------------------------------------------
# Client
# -----------------------------------------------------------------

# -----------------------------------------------------------------
# HTTP
# -----------------------------------------------------------------
HTTPGet:
  packet_id: "G"
  fields:
    - request: http_get

HTTPost:
  packet_id: "P"
  fields:
    - request: http_get

# -----------------------------------------------------------------
# Connecting
# -----------------------------------------------------------------

HandShake:
  fields:
    - protocol_reference: string
    - protocol_version: string

    - engine_version: string
    - api_version: string

    - friends_list: Array<string>

    - next_state: uint8

StatusRequest:
  fields:

JoinGame:
  fields:
    - username: string
    - identity: string

PackHashes:
  fields:
    - hashes: Array<PackHash>

# -----------------------------------------------------------------
# In-Game
# -----------------------------------------------------------------

Disconnect:
  fields:

PingRequest:
  fields:
    - payload: uint32

KeepAlive:
  fields:
    - challenge: uint8

PlayerPosition:
  fields:
    - pos: PlayerPos

PlayerRotation:
  fields:
    - x: degree
    - y: degree
    - z: degree

PlayerCheats:
  fields:
    - noclip: boolean
    - flight: boolean

PlayerHandSlot:
  fields:
    - slot: uint8

PlayerRegion:
  fields:
    - x: int16
    - z: int16

PlayerFeatures:
  fields:
    - infinite_items: boolean
    - instant_destruction: boolean
    - interaction_distance: uint12

# 0 - айди инвентаря игрока
# dst_inventory = -2 - игрок выкидывает предмет
# src_inventory = -1 - айди инвентаря курсора
# -1 = слот курсора игрока
InventoryItemMovement:
  fields:
    - src_inventory: var[W+2][R-2]
    - dst_inventory: var[W+2][R-2]
    - src_slot: uint16[W+1][R-1]
    - dst_slot: uint16[W+1][R-1]
    - action: uint8
    - item_id: uint16
    - checksum: uint24

LayoutClosing:
  fields:
    - layout_id: var

RequestChunk:
  fields:
    - x: int16
    - z: int16

RequestChunks:
  fields:
    - chunks: Array<int16>

ChatMessage:
  fields:
    - message: string

BlockUpdate:
  fields:
    - block: Block

BlockInteract:
  fields:
    - pos: BlockPosition

BlockDestroy:
  fields:
    - pos: BlockPosition

BlockRegionUpdate:
  fields:
    - block: BlockRegion

BlockRegionInteract:
  fields:
    - pos: BlockRegionPosition

BlockRegionDestroy:
  fields:
    - pos: BlockRegionPosition

PackEvent:
  fields:
    - pack: string
    - event: string
    - bytes: bytearray

PackEnv:
  fields:
    - pack: string
    - env: string
    - key: string
    - value: any

EntitySpawnAttempt:
  fields:
    - def: uint16
    - args: bson
